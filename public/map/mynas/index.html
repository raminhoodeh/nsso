<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Find your nearest myNAS health insurance network provider on the map. Search hospitals, clinics, and day surgery centers across the UAE." />
  <title>myNAS Network Map — UAE Healthcare Providers</title>
  <base href="/map/mynas/" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/map.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="app-header" id="app-header">
    <div class="header-logo">
      <img src="mynas-logo.png" alt="myNAS" style="height: 32px; object-fit: contain;">
    </div>

    <div class="header-search-wrap">
      <div class="search-bar" id="search-bar">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          id="search-input"
          placeholder="Search by provider name..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-clear" id="search-clear" aria-label="Clear search" style="display:none">✕</button>
      </div>
    </div>

    <div class="header-legend">
      <div class="legend-item" title="Red pins indicate Hospitals"><span class="legend-dot hospital"></span>Hospital</div>
      <div class="legend-item" title="Blue pins indicate Clinics"><span class="legend-dot clinic"></span>Clinic</div>
      <div class="legend-item" title="Amber pins indicate Day Surgery Centers"><span class="legend-dot day-surgery"></span>Day Surgery</div>
    </div>

    <div class="header-meta-links" style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px; margin-right: 16px; font-size: 11px;">
      <a href="https://docs.google.com/spreadsheets/d/1BBqNLMDiGZMAIaGQQmGTvYFIFioCJd6A/edit?usp=sharing&ouid=110264933146795409149&rtpof=true&sd=true" target="_blank" rel="noopener" style="color: var(--brand-blue); text-decoration: none; font-weight: 600; opacity: 0.9; transition: opacity 0.2s;" onmouseover="this.style.opacity=1; this.style.textDecoration='underline'" onmouseout="this.style.opacity=0.9; this.style.textDecoration='none'">⚙️ Raw Data</a>
      <a href="https://wa.me/447852890444" target="_blank" rel="noopener" style="color: var(--text-muted); text-decoration: none; font-weight: 500; opacity: 0.8; transition: opacity 0.2s;" onmouseover="this.style.opacity=1; this.style.color='var(--text-primary)'" onmouseout="this.style.opacity=0.8; this.style.color='var(--text-muted)'">Built by Ramin Hoodeh</a>
    </div>

    <div class="header-actions">
      <button class="btn-near-me" id="btn-near-me" title="Find providers near me">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/>
        </svg>
        Near Me
      </button>
      <button class="btn-filter-toggle" id="btn-filter-toggle" title="Toggle filters">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
        </svg>
        <span id="filter-badge" class="filter-badge hidden">0</span>
      </button>
    </div>
  </header>

  <!-- ── Filter Panel ─────────────────────────────────────────────────────── -->
  <aside class="filter-panel open" id="filter-panel">
    <div class="filter-panel-inner">
      <div class="filter-header">
        <h2>Filters &amp; List</h2>
        <div style="display: flex; gap: 12px; align-items: center;">
          <button class="btn-reset" id="btn-reset-filters">Reset</button>
          <button class="btn-minimize-panel" id="btn-minimize-panel" aria-label="Minimize sidebar" title="Minimize sidebar" style="background:rgba(0,0,0,0.05); border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; color: var(--text-muted); transition: background 0.2s;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M15 19l-7-7 7-7"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Provider Type -->
      <div class="filter-section">
        <h3 class="filter-label">Provider Type</h3>
        <div class="filter-chips" id="type-filters">
          <label class="chip chip--red active" data-type="Hospital">
            <span class="chip-dot"></span> Hospital
          </label>
          <label class="chip chip--blue active" data-type="Clinic">
            <span class="chip-dot"></span> Clinic
          </label>
          <label class="chip chip--amber active" data-type="Day Surgery Center">
            <span class="chip-dot"></span> Day Surgery
          </label>
        </div>
      </div>

      <!-- Region -->
      <div class="filter-section">
        <h3 class="filter-label">Emirate</h3>
        <select class="filter-select" id="region-filter">
          <option value="">All Emirates</option>
          <option value="Abu Dhabi">Abu Dhabi</option>
          <option value="Dubai">Dubai</option>
          <option value="Sharjah">Sharjah</option>
          <option value="Ajman">Ajman</option>
          <option value="Umm Al Quwain">Umm Al Quwain</option>
          <option value="Fujairah">Fujairah</option>
          <option value="Ras al Khaimah">Ras Al Khaimah</option>
        </select>
      </div>

      <!-- Covered Benefits -->
      <div class="filter-section">
        <h3 class="filter-label">Covered Benefits</h3>
        <div class="benefits-grid" id="benefits-filters">
          <label class="benefit-cb"><input type="checkbox" value="In-Patient" checked /> In-Patient</label>
          <label class="benefit-cb"><input type="checkbox" value="Out-Patient" checked /> Out-Patient</label>
          <label class="benefit-cb"><input type="checkbox" value="Dental" checked /> Dental</label>
          <label class="benefit-cb"><input type="checkbox" value="Maternity" checked /> Maternity</label>
          <label class="benefit-cb"><input type="checkbox" value="Optical" checked /> Optical</label>
          <label class="benefit-cb"><input type="checkbox" value="Psychiatry" checked /> Psychiatry</label>
          <label class="benefit-cb"><input type="checkbox" value="Alternative Treatment" checked /> Alternative</label>
          <label class="benefit-cb"><input type="checkbox" value="Assistance" checked /> Assistance</label>
        </div>
      </div>

      <!-- Result count -->
      <div class="filter-count" id="filter-count">Loading providers...</div>

      <!-- List View (Scrollable) -->
      <div class="provider-list-container" id="provider-list-container"></div>
    </div>
  </aside>

  <!-- ── Map ──────────────────────────────────────────────────────────────── -->
  <main class="map-container panel-open" id="map"></main>

  <!-- ── Info Sidebar (Details Panel) ─────────────────────────────────────── -->
  <aside class="info-sidebar" id="info-sidebar">
    <button class="info-sidebar-close" id="info-sidebar-close" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
    <div class="info-sidebar-content">
      <div class="info-sidebar-type-badge" id="info-type-badge">Hospital</div>
      <h2 class="info-sidebar-name" id="info-name">Provider Name</h2>
      <div class="info-sidebar-region" id="info-region">Dubai</div>

      <div class="info-sidebar-section">
        <div class="info-detail-row" id="info-address-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="info-address">—</span>
        </div>
        <div class="info-detail-row" id="info-phone-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.85 2.18 2 2 0 012.83 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 7.61a16 16 0 006.29 6.29l.98-.98a2 2 0 012.1-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          <a id="info-phone" href="" class="info-phone-link">—</a>
        </div>
      </div>

      <div class="info-sidebar-section">
        <h3 class="info-section-title">Covered Benefits</h3>
        <div class="info-benefits" id="info-benefits"></div>
      </div>

      <a class="info-directions-btn" id="info-directions" href="" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        Get Directions
      </a>
    </div>
  </aside>

  <!-- ── Loading Overlay ───────────────────────────────────────────────────── -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading UAE providers...</p>
  </div>

  <!-- ── Scripts ──────────────────────────────────────────────────────────── -->
  <script src="js/filters.js"></script>
  <script src="js/map.js"></script>

  <!-- Google Maps JS API -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA9tbFTORdHJxOZ_oGVtCqord3pBrr5B3w&callback=initMap&v=weekly"
    async defer
  ></script>
</body>
</html>
